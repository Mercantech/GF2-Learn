# Valgfri — kun hvis du kører cloudflared via CLI i stedet for Cloudflare web app.
# Normal dev-opsætning: Public hostname i dashboard → http://127.0.0.1:8031
# Se cloudflare-tunnel.md

tunnel: <TUNNEL-UUID>
credentials-file: C:\Users\<dig>\.cloudflared\<TUNNEL-UUID>.json

ingress:
  - hostname: learn-dev.gf2.dk
    service: http://127.0.0.1:8031
  - service: http_status:404
