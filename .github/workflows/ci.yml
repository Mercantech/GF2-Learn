name: CI

on:
  push:
    branches:
      - main
      - dev
      - VC
  pull_request:
    branches:
      - main
      - dev
      - VC

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GF2Learn.slnx

      - name: Build
        run: dotnet build GF2Learn.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test GF2Learn.slnx --configuration Release --no-build --verbosity normal
