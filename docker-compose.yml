# Dokploy + Cloudflare port exposure: web bruger host-netværk så localhost:WEB_HOST_PORT
# rammer appen direkte (bridge port mapping udelades ofte af Dokploy).
services:
  web:
    build: .
    network_mode: host
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:${WEB_HOST_PORT:-8031}
      ConnectionStrings__DefaultConnection: Host=127.0.0.1;Port=${POSTGRES_HOST_PORT:-5422};Database=${POSTGRES_DB:-gf2learn};Username=${POSTGRES_USER:-gf2};Password=${POSTGRES_PASSWORD:-changeme}
      ContentPath: /app/content
      GF2_BEHIND_REVERSE_PROXY: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WEB_HOST_PORT:-8031}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gf2learn}
      POSTGRES_USER: ${POSTGRES_USER:-gf2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5422}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gf2 -d gf2learn"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
