# Dokploy-deploy: docker compose up -d --build
#
# Routing (Traefik på dokploy-network):
#   Prod: APP_DOMAIN=learn.gf2.dk  (Cloudflare *.gf2.dk → tunnel → Traefik)
#   Dev:  APP_DOMAIN=vc.mercantec.tech  (Cloudflare *.mercantec.tech → samme Traefik)
#
# Samme server / samme Traefik: sæt UNIKT TRAEFIK_PREFIX per Dokploy-app (fx gf2learn-prod / gf2learn-dev).
# Ellers kolliderer router-labels mellem miljøer.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-gf2learn};Username=${POSTGRES_USER:-gf2};Password=${POSTGRES_PASSWORD:-changeme}
      ContentPath: /app/content
      GF2_BEHIND_REVERSE_PROXY: "true"
    networks:
      - dokploy-network
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.${TRAEFIK_PREFIX:-gf2-learn}-web.rule=Host(`${APP_DOMAIN:-learn.gf2.dk}`)
      - traefik.http.routers.${TRAEFIK_PREFIX:-gf2-learn}-web.entrypoints=web
      - traefik.http.routers.${TRAEFIK_PREFIX:-gf2-learn}-web.service=${TRAEFIK_PREFIX:-gf2-learn}-web
      - traefik.http.services.${TRAEFIK_PREFIX:-gf2-learn}-web.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - dataprotection:/app/data-protection-keys
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gf2learn}
      POSTGRES_USER: ${POSTGRES_USER:-gf2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gf2 -d gf2learn"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
  internal:

volumes:
  pgdata:
  dataprotection:
